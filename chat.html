<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METUbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@1,300;1,500;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ./* Ana sayfadaki fontu çekiyoruz */
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@700&display=swap');

.odtu-red { background-color: #D32F2F; }

/* METU BOT Yazı Stili */
.logo-text-wrapper {
    display: flex;
    align-items: center;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 2rem; /* Header büyüklüğüne uygun boyut */
    letter-spacing: .08em; /* Ana sayfadaki o karakteristik boşluk */
    text-transform: uppercase;
}

.logo-text-wrapper .black-part {
    color: #111; /* METU kısmı siyah */
}

.logo-text-wrapper .red-part {
    color: #D93025; /* BOT kısmı kırmızı */
}
<style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

   <header class="odtu-red text-white p-2 shadow-lg flex items-center justify-between min-h-[130px]">
    <div class="flex items-center gap-4">
        <div class="w-32 h-32 flex items-center justify-center">
            <img src="odtu-amblem.png" alt="METU Logo" class="w-full h-full object-contain transform scale-110">
        </div>
        
        <div class="logo-text-wrapper">
            <span class="black-part">METU</span>
            <span class="red-part">BOT</span>
        </div>
    </div>
    
    <div class="hidden md:block mr-6 text-sm opacity-70 italic font-light bg-white/5 px-5 py-2 rounded-full border border-white/10">
        METU Project
    </div>
</header>

    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container bg-white/50">
        <div class="flex justify-start">
            <div class="bg-white border-l-4 border-[#D32F2F] text-gray-800 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">
                <p class="font-bold odtu-text-red italic mb-1 text-lg">Merhaba!</p>
                <p class="text-sm leading-relaxed">
                    <span class="font-semibold">METUbot</span>'a hoş geldin. 
                    Sana kampüs hayatı ve okul yönetmelikleri hakkında nasıl yardımcı olabilirim?
                </p>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-100">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" placeholder="Bir şeyler sorun..." 
                   class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#D32F2F] transition-all text-sm italic">
            <button onclick="sendMessage()" 
                    class="odtu-red text-white px-8 py-4 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-lg shadow-red-900/20">
                Gönder
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;
            addMessage(text, 'user');
            userInput.value = "";
            
            // Botun kısa bir süre sonra cevap vermesi (Simülasyon)
            setTimeout(() => {
                addMessage("Bunu hemen senin için araştırıyorum...", 'ai');
            }, 1000);
        }

        function addMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const msgDiv = document.createElement('div');
            // Kullanıcı mesajları koyu gri, Bot mesajları beyaz ve kırmızı çizgili
            msgDiv.className = sender === 'user' 
                ? 'bg-gray-800 text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-md text-sm italic' 
                : 'bg-white border-l-4 border-[#D32F2F] text-gray-800 p-4 rounded-2xl rounded-tl-none max-w-[80%] shadow-sm text-sm';
            
            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatWindow.appendChild(wrapper);
            
            // Yeni mesaj gelince sayfayı aşağı kaydır
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Enter tuşuna basınca mesaj gönder
        userInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") sendMessage(); 
        });
    </script>
</body>
</html>
