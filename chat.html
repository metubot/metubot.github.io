<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METUbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }

        .odtu-red { background-color: #D32F2F; }
        .odtu-text-red { color: #D32F2F; }

        .nav-logo-style {
            display: flex;
            align-items: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: #1a1a1a;
        }

        .assistant-tag {
            text-align: center;
            width: 100%;
            font-size: 9px;
            font-style: normal;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            margin-top: 2px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 400;
        }

        /* Yazıyor animasyonu */
        .typing-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: #D32F2F;
            margin: 0 2px;
            animation: typing 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

    <!-- HEADER — index.html navbar ile birebir aynı -->
    <header style="background:rgba(250,249,247,.97);border-bottom:1px solid #E0DDD8;
                   padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;">
        <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;
                    font-family:'Barlow',sans-serif;font-weight:700;font-size:1.15rem;
                    letter-spacing:.08em;text-transform:uppercase;color:#111;">
            <img src="9.4.png" alt="ODTÜ" style="height:32px;width:auto;flex-shrink:0;">
            METU<span style="color:#D93025;">BOT</span>
        </a>
        <span style="font-family:'Barlow',sans-serif;font-size:11px;
                     letter-spacing:.06em;color:#aaa;font-weight:400;">AI Campus Assistant</span>
    </header>

    <!-- CHAT ALANI -->
    <main id="chat-window" class="flex-1 overflow-y-auto p-5 space-y-4"
          style="background:#F5F5F5;">
        <div class="flex justify-start">
            <div style="background:#ffffff;border-left:4px solid #D32F2F;color:#333;
                        border-radius:0 16px 16px 16px;padding:16px 20px;max-width:85%;
                        box-shadow:0 1px 6px rgba(0,0,0,.07);">
                <p style="color:#D32F2F;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:6px;letter-spacing:.02em;">
                    Merhaba!
                </p>
                <p style="font-size:.875rem;line-height:1.7;color:#444;font-weight:400;">
                    <span style="font-weight:600;">METUbot</span>'a hoş geldin.
                    Sana kampüs hayatı ve okul yönetmelikleri hakkında nasıl yardımcı olabilirim?
                </p>
            </div>
        </div>
    </main>

    <!-- FOOTER / INPUT -->
    <footer style="background:#ffffff;border-top:1px solid #e8e8e8;padding:14px 24px;">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" placeholder="Bir şeyler sorun..."
                   style="flex:1;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:24px;
                          padding:12px 20px;color:#333;font-size:.875rem;font-style:italic;
                          outline:none;transition:border-color .2s;"
                   onfocus="this.style.borderColor='#D32F2F'"
                   onblur="this.style.borderColor='#e0e0e0'">
            <button onclick="sendMessage()"
                    style="background:#D32F2F;color:#fff;padding:12px 28px;border-radius:24px;
                           font-weight:700;border:none;cursor:pointer;font-size:.9rem;
                           transition:background .2s;box-shadow:0 2px 8px rgba(211,47,47,.25);"
                    onmouseover="this.style.background='#B71C1C'"
                    onmouseout="this.style.background='#D32F2F'">
                Gönder
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        // Google AI Studio'dan alınan API key: https://aistudio.google.com/app/apikey
        const API_KEY = "AIzaSyDVA3DZmBjqHxddMX-miRDxnUDUA_M8VZM";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const SYSTEM_PROMPT = `Sen ODTÜ (Orta Doğu Teknik Üniversitesi) öğrencilerine yardım eden "METUbot" adlı resmi AI asistanısın.
Uzmanlık alanların: kampüs yaşamı, idari işler, öğrenci yönetmelikleri, ders kaydı, not sistemi, yurt, burs, çift anadal, kayıt dondurma, mezuniyet ve akademik prosedürler.
Kuralların:
- Kullanıcının dilinde yanıt ver (Türkçe veya İngilizce)
- Adımları net ve sıralı açıkla
- Mümkünse ilgili yönetmelik madde numarasını belirt
- Bilmediğin konularda odtu.edu.tr veya oidb.metu.edu.tr adresine yönlendir
- Samimi ama profesyonel bir ton kullan`;

        // Gemini formatında konuşma geçmişi: {role: "user"/"model", parts: [{text: "..."}]}
        let history = [];
        let isLoading = false;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (text === "" || isLoading) return;

            addMessage(text, 'user');
            userInput.value = "";
            history.push({ role: "user", parts: [{ text: text }] });

            isLoading = true;
            const typingEl = showTyping();

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: SYSTEM_PROMPT }]
                        },
                        contents: history,
                        generationConfig: {
                            maxOutputTokens: 1000,
                            temperature: 0.7
                        }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "API hatası");
                }

                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Bir hata oluştu, lütfen tekrar deneyin.";
                history.push({ role: "model", parts: [{ text: reply }] });
                typingEl.remove();
                addMessage(reply, 'ai');
            } catch (err) {
                typingEl.remove();
                addMessage("Bağlantı hatası: " + err.message, 'ai');
            } finally {
                isLoading = false;
                userInput.focus();
            }
        }

        function addMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.justifyContent = sender === 'user' ? 'flex-end' : 'flex-start';

            const msgDiv = document.createElement('div');
            msgDiv.style.maxWidth = '80%';
            msgDiv.style.padding = '14px 18px';
            msgDiv.style.fontSize = '0.875rem';
            msgDiv.style.lineHeight = '1.6';
            msgDiv.style.boxShadow = '0 2px 10px rgba(0,0,0,0.3)';

            if (sender === 'user') {
                msgDiv.style.background = '#D32F2F';
                msgDiv.style.color = '#fff';
                msgDiv.style.borderRadius = '16px 16px 0 16px';
                msgDiv.style.fontStyle = 'italic';
                msgDiv.style.boxShadow = '0 2px 8px rgba(211,47,47,.2)';
            } else {
                msgDiv.style.background = '#ffffff';
                msgDiv.style.color = '#333';
                msgDiv.style.borderLeft = '4px solid #D32F2F';
                msgDiv.style.borderRadius = '0 16px 16px 16px';
                msgDiv.style.boxShadow = '0 1px 6px rgba(0,0,0,.07)';
            }

            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start';
            wrapper.innerHTML = `
                <div style="background:#ffffff;border-left:4px solid #D32F2F;padding:14px 20px;
                            border-radius:0 16px 16px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);
                            display:flex;align-items:center;gap:6px;">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>`;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return wrapper;
        }

        userInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") sendMessage(); 
        });
    </script>
</body>
</html>
