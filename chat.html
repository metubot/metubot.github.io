<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METUbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700&family=Exo+2:ital,wght@1,300;1,500;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .odtu-red { background-color: #D32F2F; }
        .odtu-text-red { color: #D32F2F; }
        
        /* METU BOT Yazı Stili - İkisi de tam beyaz */
        .nav-logo-style {
            display: flex;
            align-items: center;
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .assistant-tag {
            text-align: center;
            width: 100%;
            font-size: 10px;
            font-style: italic;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-top: 2px;
        }

        /* Yazıyor animasyonu */
        .typing-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: #D32F2F;
            margin: 0 2px;
            animation: typing 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

    <header class="odtu-red text-white p-2 shadow-lg flex items-center justify-between min-h-[130px]">
        <div class="flex items-center gap-2">
            <div class="w-32 h-32 flex items-center justify-center">
                <img src="odtu-amblem.png" alt="METU Logo" class="w-full h-full object-contain transform scale-110">
            </div>
            
            <div class="flex flex-col items-center">
                <div class="nav-logo-style">
                    <span>METU</span>
                    <span style="margin-left: 8px;">BOT</span>
                </div>
                <div class="assistant-tag">
                    AI Campus Assistant
                </div>
            </div>
        </div>
        
        <div class="hidden md:block mr-6 text-sm opacity-70 italic font-light bg-white/5 px-5 py-2 rounded-full border border-white/10">
            METU Project
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container bg-white/50">
        <div class="flex justify-start">
            <div class="bg-white border-l-4 border-[#D32F2F] text-gray-800 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">
                <p class="font-bold odtu-text-red italic mb-1 text-lg">Merhaba!</p>
                <p class="text-sm leading-relaxed">
                    <span class="font-semibold">METUbot</span>'a hoş geldin. 
                    Sana kampüs hayatı ve okul yönetmelikleri hakkında nasıl yardımcı olabilirim?
                </p>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-100">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" placeholder="Bir şeyler sorun..." 
                   class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#D32F2F] transition-all text-sm italic">
            <button onclick="sendMessage()" 
                    class="odtu-red text-white px-8 py-4 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-lg shadow-red-900/20">
                Gönder
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        const SYSTEM_PROMPT = `Sen ODTÜ (Orta Doğu Teknik Üniversitesi) öğrencilerine yardım eden "METUbot" adlı resmi AI asistanısın.
Uzmanlık alanların: kampüs yaşamı, idari işler, öğrenci yönetmelikleri, ders kaydı, not sistemi, yurt, burs, çift anadal, kayıt dondurma, mezuniyet ve akademik prosedürler.
Kuralların:
- Kullanıcının dilinde yanıt ver (Türkçe veya İngilizce)
- Adımları net ve sıralı açıkla
- Mümkünse ilgili yönetmelik madde numarasını belirt
- Bilmediğin konularda odtu.edu.tr veya oidb.metu.edu.tr adresine yönlendir
- Samimi ama profesyonel bir ton kullan`;

        let history = [];
        let isLoading = false;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (text === "" || isLoading) return;

            addMessage(text, 'user');
            userInput.value = "";
            history.push({ role: "user", content: text });

            isLoading = true;
            const typingEl = showTyping();

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 1000,
                        system: SYSTEM_PROMPT,
                        messages: history
                    })
                });

                const data = await response.json();
                const reply = data.content?.[0]?.text || "Bir hata oluştu, lütfen tekrar deneyin.";
                history.push({ role: "assistant", content: reply });
                typingEl.remove();
                addMessage(reply, 'ai');
            } catch (err) {
                typingEl.remove();
                addMessage("Bağlantı hatası oluştu. Lütfen tekrar deneyin.", 'ai');
            } finally {
                isLoading = false;
                userInput.focus();
            }
        }

        function addMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' 
                ? 'bg-gray-800 text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-md text-sm italic' 
                : 'bg-white border-l-4 border-[#D32F2F] text-gray-800 p-4 rounded-2xl rounded-tl-none max-w-[80%] shadow-sm text-sm';
            
            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start';
            wrapper.innerHTML = `
                <div class="bg-white border-l-4 border-[#D32F2F] p-4 rounded-2xl rounded-tl-none shadow-sm flex items-center gap-1">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>`;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return wrapper;
        }

        userInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") sendMessage(); 
        });
    </script>
</body>
</html>
